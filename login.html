<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>


    <section class="login-section">
 
  <div class="login-box">
 
   
 
    <div class="logo">
 
      <a href="#home" class="logo" onclick="document.location='index.html'"> <span>Dance</span>Studio</a>
      
 
    </div>
 
    <h1>Welcome Back</h1>
 
    <p class="subtitle">
       Login to continue
    </p>
 
    <form>
 
      <div class="input-group">
 
        <label>Email Address</label>
 
        <div class="input-box">
 
          <input type="email" placeholder="Enter your email">
 
        </div>
 
      </div>
 
      
 
      <div class="input-group">
 
        <label>Password</label>
 
        <div class="input-box">
 
          <input type="password" placeholder="Enter your password">
 
        </div>
 
      </div>
 
    
 
      <div class="options">
 
        <div class="remember">
 
          <input type="checkbox">
 
          <span>Remember Me</span>
 
        </div>
 
        <a href="#">Forgot Password?</a>
 
      </div>
 
    
 
      <button class="login-btn">
 
        Login Account
 
      </button>
 
    </form>
 
    
 
    <div class="divider">
 
      <span>OR CONTINUE WITH</span>
 
    </div>
 

 
    <div class="social-buttons">
 
      <button class="social-btn">
        Google
      </button>
 
      <button class="social-btn">
        Facebook
      </button>
 
    </div>
 
    
 
    <p class="signup-text">
 
      Don't have an account?
 
      <a href="#" onclick="document.location='signup.html'">Create Account</a>
 
    </p>
 
  </div>
 
</section>
   
    </body>
    </html>
