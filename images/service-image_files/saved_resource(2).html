<title>Services Hero Section</title>

<style>
/* HERO SECTION */
.hero {
    width: 100%;
    height: 100vh;
    background-image: url("https://images.unsplash.com/photo-1524594152303-9fd13543fe6e?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* DARK OVERLAY */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
}

/* CONTENT */
.hero-content {
    position: relative;
    text-align: center;
    color: white;
    max-width: 700px;
    padding: 20px;
}

/* TITLE */
.hero-content h1 {
    font-size: 60px;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

/* TAGLINE */
.hero-content p {
    font-size: 20px;
    margin-bottom: 25px;
    font-style: italic;
}

/* BUTTON */
.hero-content a {
    display: inline-block;
    padding: 12px 25px;
    background: #ff4d6d;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 30px;
    transition: 0.3s;
}

.hero-content a:hover {
    background: #ff1e4d;
    transform: scale(1.05);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .hero-content h1 {
        font-size: 40px;
    }

    .hero-content p {
        font-size: 16px;
    }
}
</style>
